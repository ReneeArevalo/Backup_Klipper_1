[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(207)|float %}
    
    M117 Calentando cama...
    M190 S{BED_TEMP}          
    
    M117 Haciendo Home...
    G28
    G90
    
    M117 Preparando extrusor (Standby)...
    M106 S230               # Velocidad del Ventilador De Capa al 90%, Máx. 255
    G4 P2000                # Espera para asegurarse de que el ventilador esté completamente encendido.
    M109 S150               # Temperatura real de espera para evitar goteo en el mesh

    M117 Midiendo cama adaptativa...
    BED_MESH_CLEAR                      # Borrado de posibles mallas anteriores
    BED_MESH_CALIBRATE ADAPTIVE=1       # BED_MESH_PROFILE LOAD=default       # Activado y cargado de la malla  
    
    M117 Preparando extrusor...
    M106 S230               # Velocidad del Ventilador De Capa al 90%, Máx. 255
    G4 P2000                # Espera para asegurarse de que el ventilador esté completamente encendido.
    M109 S{EXTRUDER_TEMP}           
        
    #M117 Purgando extrusor en el Eje "Y"...
    #G1 Z50.0 F320
    #G1 Z10.0 F150    
    #G1 Z3.0 F75  
    #G1 X-75 Y-72 Z0.32 F1400.0    
    #G92 E0                     
    #G1 X-75 Y10.0 Z0.32 F1000.0 E35
    #G1 X-73 Y10.0 Z0.32 F1400.0      
    #G1 X-73 Y-72 Z0.32 F1000.0 E30    
    #G92 E0                     
    #G1 Z5.0 F1400

    #M117 Purgando extrusor en el Eje "X"...
    #G1 Z50.0 F1400                       # Bajar a la altura de 50mm. a 1400mm/s.
    #G1 Z10.0 F300                        # Bajar a la altura de 10mm. a 150mm/s.
    #G1 Z3.0 F150                         # Bajar a la altura de 3mm. a 75mm/s.
    #G1 X-75 Y-72 Z0.32 F3000.0           # Ir al punto de inicio de la linea  
    #G1 X55 Z0.30 F900.0 E35              # Trazar la primera linea de purgado
    #G92 E0                               # Reset del Extrusor
    #G1 X53 Y-72.0 Z0.30 F1400.0          # Subir un poco en "Y"
    #G1 X-75 Z0.30 F900.0 E30             # Trazar la segunda linea de purgado
    #G1 Z5.0 F1400                        # Levantar al boquilla
    #G92 E0                               # Reset del Extrusor

    # la siguiente configuracion esta OK. y solamente para va en el laminardor de Orca Slicer en el G-Code de inicio de la maquina
    #G92 E0.0;
    #M117 Purgando Extrusor...
    #G1 X{first_layer_print_min [0]-10} Y{first_layer_print_min [1] } Z0.8 F1400.0;
    #G1 X{first_layer_print_min [0]-10} Y{first_layer_print_min [1]+40} E30 F350.0;
    #G92 E0.0;
    #G1 E-0.5 F900;
    #G1 Y{first_layer_print_min [0]+40} F1400.0;
    #G92 E0.0;

    M117 ¡Iniciando Impresion...!

[gcode_macro END_PRINT]
gcode:
    M400                          ; Esperar a que el buffer se limpie
    TURN_OFF_HEATERS              ; Apaga extrusor y cama (reemplaza M104 y M140)
    
    # 1. Movimiento de seguridad inicial
    G91                           ; Coordenadas relativas
    G1 Z+15 E-5                   ; Pequeña retracción rápida para evitar hilos  //  F720 Y Subir un poco para no rayar la pieza  //  F620
    # G1 Z+15                       ; Subir un poco para no rayar la pieza  //  F620
    
    # 2. Retracción larga para cambio de filamento (si lo deseas)
    M82                           ; Extrusor en modo absoluto
    G1 E-25                       ; Retraer filamento para facilitar retiro  // F620
    
    # 3. Retorno a posición de reposo (Delta Home)
    M117 Haciendo Home...
    G28                           ; En Delta, esto sube los 3 ejess al máximo
    G90                           ; Volver a coordenadas absolutas
    G1 X0 Y0 Z340.00              ; Posicionarse en lugar seguro  // F720
    
    # 4. Limpieza de estado
    M117 Pieza finalizada...
    BED_MESH_CLEAR                ; Borrar malla de KAMP
    CLEAR_PAUSE                   ; Limpiar estados de pausa
    M84                           ; Apagar motores
    M106 S179               # Velocidad del Ventilador De Capa al 70%, Máx. 255
    G4 P2000                # Espera para asegurarse de que el ventilador esté completamente encendido.
    
    # 5. Notificación Final (Sonidos y mensajes)
    END_TUNE               # Tono de 500ms a 1500Hz para indicar finalización / Tu melodía final; Sugerencia: En lugar de pausas G4 largas, usa solo los tonos finales
    M117 Enfriando y Lista...

[gcode_macro G29]
description: "Comando G29"
gcode:
  M117 Calentando Cama y Extrusor...
  M140 S60               # Configura la temperatura de la Cama a 60° C.
  M190 S60               # Espera a que la temperatura de la cama llegue a 60° C.
  M106 S230               # Velocidad del Ventilador De Capa al 90%, Máx. 255
  G4 P2000                # Espera para asegurarse de que el ventilador esté completamente encendido
  M104 S207              # Configura la temperatura del Hotend a 207° C.
  M109 S207              # Espera a que la temperatura del hotend llegue a 207° C.
  G4 P2000               # Espera para asegurarse de que el ventilador esté completamente encendido
  M117 Busqueda Home...
  G28                    # Realizar auto-home de todos los ejes "a, b, c"
  # EXCLUDE_OBJECT_DEFINE
  M117 Borrado malla
  BED_MESH_CLEAR
  M117 Generando Malla KAMP
  BED_MESH_CALIBRATE             # BED_MESH_CALIBRATE PROFILE=adaptive ADAPTIVE=1
  M117 Ubicación De Inicio Mallado...
  G0 X0 Y0 Z10 F620
  #BED_MESH_PROFILE save=default
  END_TUNE               # Tono de 500ms a 1500Hz para indicar finalización / Tu melodía final

