[gcode_macro PID_EXTRUSOR]
description: "Realiza PID tuning del extrusor con el ventilador de capa encendido al 90%"
gcode:
    M117 Busqueda Home...
    G28                    # Realizar auto-home de todos los ejes "a, b, c"
    M117 Posicion Segura...
    G1 Z340.00 F900
    M106 S230              # Velocidad del Ventilador De Capa al 90%, Máx. 255
    G4 P2000               # Espera para asegurarse de que el ventilador esté completamente encendido.
    M117 Calentando Extrusor...
    M117 PID Extrusor...
    PID_CALIBRATE HEATER=extruder TARGET=207    # Iniciar PID tuning para el extrusor
    M117 Fin PID Extrusor...
    M300 S1000 P500                             # Tono de 500ms a 1000Hz para indicar finalización.

[gcode_macro PID_CAMA]
