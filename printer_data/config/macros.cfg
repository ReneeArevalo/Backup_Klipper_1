######################################################################
# CONFIGURACION ACTIVACION (BUZZER/BEEPER)
######################################################################

#Configuración Típica para RAMPS 1.4 y 12864 Display

[gcode_macro M300]     # M300 (Activa el Buzzer), Sintaxis: M300 S<frecuencia_Hz> P<duracion_ms>
description: "Toca un tono en el buzzer de la impresora usando frecuencia (S) y duración (P)"
gcode:
   # Definición de Parámetros (S: Frecuencia en Hz, P: Duración en ms)
  {% set S = params.S|default(1000)|float %} ; Frecuencia del tono (Default 1000 Hz)  // 5000
  {% set P = params.P|default(500)|int %}   ; Duración del tono (Default 500 ms)    // 60
  # Comprobación de que la frecuencia y duración son válidas
  {% if S > 0 and P > 0 %}
      # Cálculo del tiempo de ciclo (Inverso de la frecuencia:
      {% set cycle_t = 1.0 / S %}
      # Generar el tono:
      # Se asume que el pin del buzzer se llama 'beeper'.
      SET_PIN PIN=beeper VALUE=0.5 CYCLE_TIME={cycle_t}
      #  Esperar la duración del tono (P milisegundos)
      G4 P{P}
      #  Apagar el buzzer
      SET_PIN PIN=beeper VALUE=0
  {% endif %}