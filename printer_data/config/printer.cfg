# This file contains common pin mappings for RAMPS (v1.3 and later)
# boards. RAMPS boards typically use a firmware compiled for the AVR
# atmega2560 (though the atmega1280 is also possible).

# See docs/Config_Reference.md for a description of parameters.

######################################################################
# This file is an example config file for linear delta style printers.
# One may copy and edit this file to configure a new delta printer.
#
# DO NOT COPY THIS FILE WITHOUT CAREFULLY READING AND UPDATING IT
# FIRST. Incorrectly configured parameters may cause damage.
#
# See docs/Config_Reference.md for a description of parameters.
######################################################################

######################################################################
# ARCHIVOS INCLUIDOS Y OTROS
######################################################################

[include mainsail.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
[exclude_object]              # Obligatorio para que KAMP sepa dónde hay piezas
[display_status]              # Para que los mensajes M117 funcionen bien

[mcu]
serial: /dev/serial/by-id/usb-Arduino__www.arduino.cc__0042_55838323935351F00171-if00
restart_method: arduino				    # mecanismo que el host usará para reiniciar el microcontrolador. // arduino // command // rpi_usb
baud: 115200

[gcode_arcs]                  # Recomendado para movimientos fluidos
resolution: 1.0

######################################################################
# CONFIGURACION DE LA IMPRESORA (SINEMATICA - DELTA)
######################################################################

[printer]
kinematics: delta						# Tipo/sinematica de impresora / cartesian
#delta_radius: 155       				# Radio (en mm) del círculo horizontal formado por las tres torres de los ejes lineales. // 151
print_radius: 105						# Radio imprimible de la cama sin generar coliciones con las torres
max_velocity: 200						# Velocidad máxima de seguridad     // * 200 // 200 "Prueba Input-Shaper"
max_accel: 1400 						# Aceleración máxima de seguridad   // * 1200 // 4200 "Prueba Input-Shaper"
max_z_velocity: 5 						# Velocidad máxima del eje Z de seguridad // * 5 // 10 "Prueba Input-Shaper"
max_z_accel: 100						# Aceleración máxima del eje Z de seguridad  // * 100 // 2000 "Prueba Input-Shaper"
minimum_z_position: -2		    		# La posición mínima en Z a la que el usuario puede ordenar al cabezal que se mueva. El valor predeterminado es 0. // -2
minimum_cruise_ratio: 0.5				# Esta opción reduce la velocidad máxima de estos movimientos para garantizar que siempre haya una distancia mínima recorrida a una velocidad de crucero.
square_corner_velocity: 5      			# Este valor configura el algoritmo interno de velocidad centrípeta en curvas; las curvas con ángulos mayores a 90 grados tendrán una mayor velocidad de giro, mientras que las curvas con ángulos menores a 90 grados tendrán una velocidad de giro menor...  // *5 // 5 "Prueba Input-Shaper"

######################################################################
# CONFIGURACION DE MOTORES PAP. (X=a, Y=b, Z=c, E=extruder)
######################################################################

[endstop_phase]

[stepper_a]
step_pin: PF0							# Pin de paso/mm, número mágico
dir_pin: PF1							# Pin de dirección, Para invertir el giro, se antepone o retira el signo = "!".
enable_pin: !PD7						# Pin de habilitación. Para invertir el giro, se antepone o retira el signo = "!".
microsteps: 16							# Micropasos del Driver 8,16,32... 
rotation_distance: 8	    			# (200 Pasos/mm. "Motor" * 16 Micropasos-A4988)/400 pasos/mm. "Marlin"=8  // Cuadro (8*((84.03+83.83+84.41)/3))/80 ==> 8.409
endstop_pin: ^!PE4						# Pin de final de carrera NO/NC. Para invertir el giro, se antepone o retira el signo = "!". Para activar resistencia interna ó el pull-up interno = "^". // !PE5
#position_endstop: 385                  # ALTURA MÁXIMA REAL (a,b,c)
homing_speed: 5
#angle: 210
#arm_length: 292		   		       	# Longitud (en mm) de la varilla diagonal (Brazoz) que conecta esta torre con el cabezal de impresión (DELTA_DIAGONAL_ROD). NOTA: Por defecto el valor tambien lo toman (stepper_b y stepper_c).

[stepper_b]
step_pin: PF6
dir_pin: PF7
enable_pin: !PF2
microsteps: 16
rotation_distance:  8                  # // Cuadro (8*((82.79+82.82.86)/3))/80 ==> 8.284
endstop_pin: ^!PJ0
#angle: 330

[stepper_c]
step_pin: PL3
dir_pin: PL1
enable_pin: !PK0
microsteps: 16
rotation_distance:  8
endstop_pin: ^!PD2
#angle: 90

[extruder]
step_pin: PA4							# Pin de paso/mm, número mágico
dir_pin: !PA6							# Pin de dirección. Para invertir el giro, se antepone o retira el signo = "!".
enable_pin: !PA2						# Pin de habilitación. Para invertir el giro, se antepone o retira el signo = "!".
microsteps: 16							# Micropasos del Driver 8,16,32... 
rotation_distance: 22.78                # // 37.70 // 37.69910 // 4.523 (200 Pasos/mm. "Motor" * 16 Micropasos-A4988)/95.14 pasos/mm. "Marlin"=33.63 // Aprox. 34
                                        # 33.63 - 53.98 mm.
                                        #   X   - 50 mm.
                                        # NO SIRVE LA REGLA DE TRES SIMPLE: X = 33.63 * 50 / 53.98) = 31.1504 ===> Aprox. 31.15 "No Sirvio"
                                        # NOTA INVERTIR LA REGLA DE TRES SIMPLE: X = 33.63 * 53.98 / 50) = 36.3069 ===> Aprox. 36.31
                                        # Otro método es medir el diametro del piñon y multiplicar por Pi "3.141592". Ej.: Diam. = 10mm.  ===> 10 x 3.141592 = 31.41592 => Aprox. 31.416 // 12 x 3.141592 = 37.69910 // 37.03936
nozzle_diameter: 0.600					# Diametro de boquilla // 0.400
filament_diameter: 1.750				# Diametro de filamento // 0.400
max_extrude_cross_section: 2.5           # Esta configuración previene cantidades excesivas de extrusión durante movimientos XY relativamente pequeños.
max_extrude_only_distance: 675          # Longitud máxima (en mm de filamento crudo) que puede tener un movimiento de retracción o solo extrusión. // 300
heater_pin: PB4							# Pin del calentador del extrusor
sensor_type: EPCOS 100K B57560G104F		# Tipo de termistor // 100k thermistor - best choice for EPCOS 100k (4.7k pullup)
sensor_pin: PK5							# Pin de termistor
control: pid							# Tipo de control // pid // watermark
pid_kp: 28.981        # 28.456
pid_ki: 1.756         # 1.725
pid_kd: 119.546       # 117.383
min_extrude_temp: 170					# Temperatura mínima a la que comenzará a mover el Extrusor
min_temp: -5							# Temperatura mínima del Hotend/Extrusor
max_temp: 245							# Temperatura máxima del Hotend/Extrusor
pressure_advance: 0.24                  # Para extrusores directos el factor es 0.005 y bowden "Delta" el factor es 0.020    // * 0.36 // 0.34 // 0.32 // 0.64 // 0.28 // 0.36 // Deshabilitado "Prueba Input-Shaper"
                                        # Formula General: (inicio "0" + Medida buena prueba imp. 16 mm.) * Factor "Bouden" 0.020
                                        # // (0 + 14)mm. * 0.020 = 0.28 // (0 + 16)mm. * 0.020 = 0.32 // (0 + 18)mm. * 0.020 = 0.36 // (0 + 32)mm. * 0.020 = 0.64
                                        # // (0 + ((11.53+10.92+12.35+12.66+12.14+12.90+12.40+12.47)mm.)/8) * 0.020 = 0.243425 "Según Torre de prueba realizada"
                                        # // (0 + ((16.07+17.04+15.78+16.58)mm.)/4) * 0.020 = 0.32735 "Según Torre de prueba realizada"
                            
#[extruder1]
#step_pin: PC1
#dir_pin: PC3
#enable_pin: !PC7
#heater_pin: PH6
#sensor_pin: PK7
#...

######################################################################
# CONFIGURACION DE LA CAMA
######################################################################

[heater_bed]
heater_pin: PH5							# Pin del calentador de la cama
sensor_type: EPCOS 100K B57560G104F		# Tipo de termistor // 100k thermistor - best choice for EPCOS 100k (4.7k pullup)
sensor_pin: PK6							# Pin de termistor
control: pid
pid_kp: 57.165      # 62.855
pid_ki: 0.888       # 0.974
pid_kd: 919.636     # 1013.536
min_temp: 18							# Temperatura mínima de la cama
max_temp: 90							# Temperatura máxima de la cama

######################################################################
# CONFIGURACION DE LA VENTILACION
######################################################################

[fan]         # [heater_fan Enfriador_Extrusor]
pin: PH6                                # // PH6, PC13, PC8, PD12, PB1, PB0
max_power: 1.0
shutdown_speed: 1.00                    # // Es 1.00 ó 0.00
cycle_time: 0.010
hardware_pwm: False
kick_start_time: 1.0					# Tiempo (en segundos) para hacer funcionar el ventilador a máxima velocidad cuando se activa por primera vez o se aumenta en más del 50% (ayuda a que el ventilador gire). El valor predeterminado es 0.100 segundos.
off_below: 0.35                         # Debe coincidir con "heater_temp"
# fan_speed: 0.90							# 1.0 significa el 100% de la velocidad máxima del ventilador  // 0.90 // 1.0
# heater: extruder
# heater_temp: 55						    # Temperatura a la que deja de funcionar el ventilador. // 65

######################################################################
# CONTROL DE TEMPERATURA
######################################################################

[verify_heater extruder]
max_error: 500
check_gain_time: 20
hysteresis: 20
heating_gain: 2              # La temperatura mínima/maxima (en Celsius) que el calefactor debe aumentar. Por defecto es 2.

[verify_heater heater_bed]
max_error: 120
check_gain_time: 60
hysteresis: 5
heating_gain: 2

######################################################################
# CALIBRACION DELTA
######################################################################

[delta_calibrate]
radius: 95								# Radio (en mm) del área que se puede sondear. // 95 // 72. El radio total es de 208mm, El radio máximo de cama es de 98 con rango de seguridad incluido "del Efector". 
speed: 25								# Velocidad de calibración  // 50
horizontal_move_z: 10					# Altura (en mm) a la que se debe ordenar mover la cabeza justo antes de iniciar una operación de sondeo. El valor predeterminado es 5. // 10

[probe]
pin: ^PD3				            	# La sonda está conectada al pin 7, que es un pin estándar para sondas Z. // tambien probar con !PC7, !PE5, !PJ1, !PD3
                                        # ^ = pull-up interno
                                        # ! = lógica invertida (LM393 normalmente es activo LOW). Si tu sensor dispara al revés, quita !
x_offset: 0.0
y_offset: 0.0
#z_offset: -0.650						# Altura Z de la sonda (cuando se activa).  // 3
speed: 5  								# Velocidad de sondeo.
lift_speed: 5  				        	# Velocidad (en mm/s) del eje Z al levantar la sonda entre muestras. El valor predeterminado es usar el mismo valor que el parámetro 'velocidad/speed: 5'.
samples: 5          					# Número de veces que se medirá cada punto de nivelación. // 1
samples_result: average
sample_retract_dist: 5					# Distancia de retracción de la sonda Z entre muestras.  // 2
samples_tolerance: 0.022				# La distancia máxima en Z (en mm) que una muestra puede diferir de otras muestras. Si se excede esta tolerancia, se reporta un error o se reinicia el intento. El valor predeterminado es 0.100 mm. 
samples_tolerance_retries: 5			# El número de veces que se intentará de nuevo si se encuentra una muestra que exceda - samples_tolerance-. En un reintento, todas las muestras actuales se descartan y se reinicia el intento de sondeo. De lo contrario se reporta un error. El valor predeterminado es cero.
activate_gcode:
    G4 P150                             # Tiempo de estabilización del sensor
deactivate_gcode:
    G4 P100

########################################################################################
# AJUSTE DE TORNILLOS NIVELADORES (4 TORNILLOS M4*70MM.) PARA NIVELADO DE CAMA
########################################################################################

# USO: 1. Precalentamiento de Cama y Hotend "Operacionales de 1er capa". 
#      2. Hacer Home "G28" e iniciar las temperaturas tipicas 60°/207°. 
#      3. En la ventana de Toolhead, Iniciar la funcion "Screews Tilt Calculate y CW".
#      4. Seguir los ajustes que se requieran "rojos" teniendo en cuenta como base el tornillo #1,2,3, ó 4 según la indicación de scrip.
#      5. Realizar dicho ajuste hasta aproximadamente un rango de 00:00 a 00:05 "El giro se da en minutos de acuerdo al resultado horario o antihorario"

[screws_tilt_adjust]
screw1: -70,-70				        	# Coordenada Tornillo #1 "Tornillo Frontal Izquierdo" // 58,70
screw1_name: Tornillo Delantero Izquierdo	       	# Tornillo Frontal Izquierdo #1, front left screw
screw2: 70,-70				        	# Coordenada Tornillo #2 "Tornillo Frontal Derecho" // 216,70
screw2_name: Tornillo Delantero Derecho	       	# Tornillo Frontal Derecho #2, front right screw
screw3: 70,70				        	# Coordenada Tornillo #3 "Tornillo Trasero Derecho" // 216,224
screw3_name: Tornillo Trasero Derecho	       	# Tornillo Trasero Derecho #3, rear right screw
screw4: -70,70				        	# Coordenada Tornillo #4 "Tornillo Trasero Izquierdo" // 58,224
screw4_name: Tornillo Trasero Izquierdo	       	# Tornillo Trasero Izquierdo #4, rear left screw
horizontal_move_z: 10				    # Altura de levantamiento de la boquilla para movimientos // 10
speed: 50 								# Velocidad de movimiento // 50 // 25 // 100
screw_thread: CW-M4 					# Es el sentido de giro que toma la perilla del tornillo para que la cama se hacerque al hotend (En sentido de giro horario/Manecillas de reloj es CW y Anti-horario es CCW). Y para el tipo de rosca del tornillo de nivelación se toma según su rosca milimetrica; Métrica 4 = M4.  // CW-M4 // CCW-M3   

########################################################################################
# DATOS PARA MALLA DE LA CAMA
########################################################################################

[bed_mesh]
speed: 25							# Velocidad de desplazamiento entre puntos de sondeo. // 50
horizontal_move_z: 15				# La coordenada Z a la que se eleva la sonda antes de desplazarse entre puntos. // 20

# Geometría DELTA
mesh_min: -70, -70   # Habilitado para poder hacer el mallado de cama con Deltas.
mesh_max: 70, 70     # Habilitado para poder hacer el mallado de cama con Deltas.
probe_count: 7, 7    # Habilitado para poder hacer el mallado de cama con Deltas. // 5, 5
# mesh_radius: 94				   # Importante para Deltas (radio de la cama)  // Desabilitado porque no realiza el mallado de cama con Deltas.
# mesh_origin: 0, 0                # Centro de la cama para Deltas  // Reactivadas 29-Mar-2026  // Desabilitado porque no realiza el mallado de cama con Deltas.
# round_probe_count: 7			   # Este valor entero define el número máximo de puntos sondeados a lo largo de los ejes X e Y. Este valor debe ser impar, ej: 5, 7 o 9); ya que se requiere sondear el centro de la malla. // 5  // Desabilitado porque no realiza el mallado de cama con Deltas.

# Interpolación
mesh_pps: 3, 3						# Esta mesh_ppsopción es una abreviatura de "Puntos de malla por segmento". Esta opción especifica cuántos puntos se interpolarán para cada segmento a lo largo de los ejes X e Y.  // 5, 5
algorithm: bicubic					# La interpolación bicúbica requiere un mínimo de 4 puntos de sondeo a lo largo de cada eje.
bicubic_tension: 0.2
move_check_distance: 5				# La distancia mínima para comprobar el cambio deseado en Z antes de realizar una división..
split_delta_z: 0.025				# Es la desviación mínima necesaria para activar una división de movimiento (Depende dela anterior funcion).

# KAMP / Adaptive
adaptive_margin: 5

# Fade
fade_start: 1						# La altura Z a partir de la cual se iniciará el ajuste de atenuación gradual. Es recomendable aplicar algunas capas antes de iniciar el proceso de atenuación.
fade_end: 10						# La altura Z a la que debe completarse el desvanecimiento. Si este valor es inferior a , fade_start el desvanecimiento se desactiva. 
fade_target: 0.15					# puede considerar como un desplazamiento Z adicional aplicado a toda la cama después de que se completa el desvanecimiento.  // 0.15 // 0 // para que se utilice la altura promedio de la malla o no dejarla en cero "0"

zero_reference_position: 0, 0	    # Debe ser la ubicación en la cama donde se realiza la prueba de papel

######################################################################
# CONFIGURACION MCU INPUT-SHAPER (ACELEROMETRO-FLY-ADXL345)
######################################################################

# Tomado de: https://www.klipper3d.org/Measuring_Resonances.html?h=resonances
#            https://www.youtube.com/watch?v=FBWj8q5e6Wo
#            https://www.youtube.com/watch?v=9S7uGbbBfx0
#            https://www.youtube.com/watch?v=rv3iTGCujWQ

# [include adxl345.cfg]       # NOTA IMPORTANTE: Realizada la calibración se debe comentar esta linea para poder retirar el Acelerometro y asi evitar errores por MCU.  // Habilitado  "Prueba Input-Shaper"

#[input_shaper]         # // * Inicio       "Prueba Input-Shaper"
#shaper_type: mzv       # // * mzv Inicio "Prueba Input-Shaper"
#shaper_freq_x: 0       # // * 0 Inicio     "Prueba Input-Shaper"
#shaper_freq_y: 0       # // * 0 Inicio     "Prueba Input-Shaper"

# [input_shaper]           # // Prueba 1 "Prueba Input-Shaper"
# shaper_type_x = mzv      # // Prueba 1 "Prueba Input-Shaper"
# shaper_freq_x = 136.4    # // Prueba 1 "Prueba Input-Shaper"
# shaper_freq_y = 136.0    # // Prueba 1 "Prueba Input-Shaper"

[input_shaper]            # // Prueba 2 "Recomendada Prueba Final Input-Shaper"
shaper_freq_x: 30.6      # // Prueba 2 "Recomendada Prueba Final Input-Shaper" // 39.0
shaper_type_x: mzv        # // Prueba 2 "Recomendada Prueba Final Input-Shaper" //  2hump_ei
shaper_freq_y: 136.0      # // Prueba 2 "Recomendada Prueba Final Input-Shaper"
shaper_type_y: mzv        # // Prueba 2 "Recomendada Prueba Final Input-Shaper"

#[input_shaper]
#shaper_freq_x: 52.6      # // 52.6 // 47.8 // 43.63 // 34.6 // 47.6 // 47.00 // 36.36 // 45.6
#shaper_freq_y: 41.0      # // 41.0 // 48.4 // 53.33 // 36.8 // 52.0 // 44.20 // 42.10 // 53.0
#shaper_type_y: mzv       # // mzv // ei // ei // mzv // zv // mzv // mzv // mzv

######################################################################
# CARGADO AUTOMATICO DE HOME-AUTOMATICO Y LECHO DE MALLA
######################################################################

[delayed_gcode start]
initial_duration: 1.0
gcode:
  G28
  G1 Z340.00
  BORRAR_PAUSA
  BED_MESH_PROFILE REMOVE=default    # Elimina la Malla Existente // BED_MESH_PROFILE LOAD=default # Carga la Malla guardada
  M300 S1000 P500                    # Tono de 500ms a 1000Hz para indicar finalización
  M117 Delta 3D Lista...

######################################################################
# CONFIGURACION DE DRIVERS
######################################################################

# X Driver ===> DRV8825, a 1/16 de paso; configurados asi: (M0>Low, M1>Low, M2>High).
# Y Driver ===> DRV8825, a 1/16 de paso; configurados asi: (M0>Low, M1>Low, M2>High).
# Z Driver ===> DRV8825, a 1/16 de paso; configurados asi: (M0>Low, M1>Low, M2>High).
# E Driver ===> DRV8825, a 1/16 de paso; configurados asi: (M0>Low, M1>Low, M2>High).

